<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Hero demo — yatay kayan foto duvarı</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:#0c1118;color:#fff}
  .hero{position:relative;height:80vh;min-height:480px;overflow:hidden;display:flex;align-items:center}
  /* yatay kayan satırlar */
  .wall{position:absolute;inset:0;display:flex;flex-direction:column;gap:5px;padding:5px;filter:saturate(.92)}
  .row{display:flex;gap:5px;flex:1;width:max-content;will-change:transform;animation:slide linear infinite}
  .row img{height:100%;width:auto;object-fit:cover;border-radius:4px;display:block}
  @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  /* overlay + içerik */
  .ovl{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,14,22,.6),rgba(8,14,22,.72));z-index:1}
  .inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 24px;width:100%}
  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#cfe8ff}
  h1{font-family:"Roboto Slab",serif;font-size:clamp(34px,5vw,56px);line-height:1.1;margin:16px 0 0;max-width:14em}
  p{margin-top:18px;font-size:19px;color:rgba(255,255,255,.92);max-width:36em}
  .note{position:fixed;bottom:0;left:0;right:0;background:#11161f;color:#9fb0c0;font-size:13px;padding:10px 16px;text-align:center;z-index:5}
  @media(prefers-reduced-motion:reduce){.row{animation:none!important}}
</style>
</head>
<body>
<section class="hero">
  <div class="wall" id="wall"></div>
  <div class="ovl"></div>
  <div class="inner">
    <span class="eyebrow">Mersin University Psychology Laboratory</span>
    <h1>The science of learning, memory, and behavior.</h1>
    <p>The neuroscience of taste, learning, and behavior.</p>
  </div>
</section>
<div class="note">DEMO — yatay kayan foto duvarı (26 lab fotosu). Beğenirsen ana sayfa hero'suna taşınır.</div>
<script>
  var N=26, base=[];
  for(var i=1;i<=N;i++) base.push("/assets/hero-wall/"+i+".jpg");
  function rot(a,k){return a.slice(k).concat(a.slice(0,k));}
  // 6 satır, küçük tile, hepsi sola sürekli akar; her satır farklı sıra/hızda
  var rows=[
    {dur:56,off:0, rev:false},{dur:74,off:3, rev:true}, {dur:64,off:7, rev:false},
    {dur:84,off:11,rev:true}, {dur:60,off:15,rev:false},{dur:78,off:18,rev:true},
    {dur:68,off:22,rev:false},{dur:88,off:25,rev:true}
  ];
  var wall=document.getElementById("wall");
  rows.forEach(function(r){
    var row=document.createElement("div");
    row.className="row"; row.style.animationDuration=r.dur+"s";
    // 26 fotoyu satıra göre döndürerek diz (geniş ekranda boşluk kalmaz)
    var half=rot(base,r.off);
    if(r.rev) half=half.slice().reverse();
    half.concat(half).forEach(function(src){          // sorunsuz döngü için tüm seti 2 kopya
      var im=document.createElement("img");
      im.src=src; im.alt=""; im.loading="lazy";
      row.appendChild(im);
    });
    wall.appendChild(row);
  });
</script>
</body></html>
