<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Hero demo — kayan foto duvarı</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:#0c1118;color:#fff}
  .hero{position:relative;height:78vh;min-height:460px;overflow:hidden;display:flex;align-items:center}
  /* foto duvarı */
  .wall{position:absolute;inset:0;display:flex;gap:10px;padding:10px;filter:saturate(.92)}
  .col{flex:1;display:flex;flex-direction:column;gap:10px;will-change:transform}
  .col img{width:100%;height:200px;object-fit:cover;border-radius:10px;display:block}
  .col.up{animation:up linear infinite}
  .col.down{animation:down linear infinite}
  @keyframes up{from{transform:translateY(0)}to{transform:translateY(-50%)}}
  @keyframes down{from{transform:translateY(-50%)}to{transform:translateY(0)}}
  /* okunaklılık overlay'i */
  .ovl{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,14,22,.62),rgba(8,14,22,.72));z-index:1}
  .inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 24px;width:100%}
  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#cfe8ff}
  h1{font-family:"Roboto Slab",serif;font-size:clamp(34px,5vw,56px);line-height:1.1;margin:16px 0 0;max-width:14em}
  p{margin-top:18px;font-size:19px;color:rgba(255,255,255,.92);max-width:36em}
  .note{position:fixed;bottom:0;left:0;right:0;background:#11161f;color:#9fb0c0;font-size:13px;padding:10px 16px;text-align:center;z-index:5}
  @media(prefers-reduced-motion:reduce){.col{animation:none!important}}
</style>
</head>
<body>
<section class="hero">
  <div class="wall" id="wall"></div>
  <div class="ovl"></div>
  <div class="inner">
    <span class="eyebrow">Mersin University Psychology Laboratory</span>
    <h1>The science of learning, memory, and behavior.</h1>
    <p>The neuroscience of taste, learning, and behavior.</p>
  </div>
</section>
<div class="note">DEMO — mekanizma önizlemesi. Eldeki birkaç foto tekrar ediyor; gerçeğinde 20–40 farklı foto olacak.</div>
<script>
  // Eldeki görseller (gerçeğinde çok daha fazlası)
  var imgs=["/assets/campus.jpg","/assets/team/maria.jpg","/assets/campus2.jpg","/assets/team/emre.jpg","/assets/team/resul.jpg"];
  var cols=[
    {dir:"up",  dur:38, order:[0,1,2,3,4]},
    {dir:"down",dur:46, order:[3,2,4,0,1]},
    {dir:"up",  dur:52, order:[4,0,1,2,3]},
    {dir:"down",dur:42, order:[1,4,0,3,2]}
  ];
  var wall=document.getElementById("wall");
  cols.forEach(function(c){
    var col=document.createElement("div");
    col.className="col "+c.dir;
    col.style.animationDuration=c.dur+"s";
    // sorunsuz döngü için listeyi iki kez koy
    var seq=c.order.concat(c.order);
    seq.forEach(function(i){
      var im=document.createElement("img");
      im.src=imgs[i]; im.alt=""; im.loading="lazy";
      col.appendChild(im);
    });
    wall.appendChild(col);
  });
</script>
</body></html>
