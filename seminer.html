<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Seminar Presentation · Committee Access — MUPLAB</title>
<style>
/* ---- Fontlar (self-host) ---- */
@font-face{
  font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;
  src:url('/assets/fonts/inter-latin.woff2') format('woff2');

}
@font-face{

  src:url('/assets/fonts/inter-latin-ext.woff2') format('woff2');
  unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;

  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
}
@font-face{
  font-family:'Newsreader';font-style:normal;font-weight:200 800;font-display:swap;
  src:url('/assets/fonts/newsreader-latin-ext.woff2') format('woff2');
  unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;

@font-face{
  font-family:'Space Grotesk';font-style:normal;font-weight:300 700;font-display:swap;
  src:url('/assets/fonts/spacegrotesk-latin.woff2') format('woff2');
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
}
@font-face{
  font-family:'Space Grotesk';font-style:normal;font-weight:300 700;font-display:swap;
  src:url('/assets/fonts/spacegrotesk-latin-ext.woff2') format('woff2');
  unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;
}

/* ---- Giriş ekranı (tamamı #mgiris ile scope'lu) ---- */
#mgiris{
  --ink:#1f2328; --body:#454b54; --muted:#5d646a; --line:#e7e9ec;
  --bg:#fff; --bg-alt:#f5f7f6; --accent:#235e56; --accent-d:#1b4842;
  --accent-tint:#eff4f2; --clay:#b5612f;
  --slab:'Newsreader',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --gro:'Space Grotesk','Inter',system-ui,sans-serif;
  position:fixed; inset:0; overflow:auto;
  display:flex; flex-direction:column; align-items:center;
  padding:32px 20px;
  background:radial-gradient(120% 120% at 50% 18%, #256058 0%, #1a4a42 55%, #123a34 100%);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  box-sizing:border-box;
}
#mgiris *, #mgiris *::before, #mgiris *::after{ box-sizing:border-box; }

/* Nefes alan parlama — yalnızca opacity animasyonu */
#mgiris .mg-glow{
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(46% 34% at 28% 22%, rgba(255,255,255,.10), transparent 70%),
    radial-gradient(40% 30% at 74% 76%, rgba(181,97,47,.12), transparent 70%);
  opacity:.55;
  animation:mgiris-breathe 9s ease-in-out infinite alternate;
}
@keyframes mgiris-breathe{
  from{ opacity:.35; }
  to{ opacity:.85; }
}

/* Kart — auto margin ile güvenli dikey ortalama (kısa ekranda kırpılmaz) */
#mgiris .mg-card{
  position:relative;
  width:100%; max-width:412px;
  margin-top:auto;
  background:var(--bg);
  border-radius:18px;
  padding:44px 40px 36px;
  box-shadow:0 24px 64px rgba(6,24,21,.38), 0 4px 16px rgba(6,24,21,.22);
  text-align:center;
}
#mgiris .mg-card::before{
  content:""; position:absolute; top:0; left:40px; right:40px; height:3px;
  border-radius:0 0 3px 3px;
  background:linear-gradient(90deg, var(--accent), var(--clay));
  opacity:.9;
}
#mgiris .mg-shake{ animation:mgiris-shake .45s ease; }
@keyframes mgiris-shake{
  0%,100%{ transform:translateX(0); }
  20%{ transform:translateX(-9px); }
  40%{ transform:translateX(8px); }
  60%{ transform:translateX(-6px); }
  80%{ transform:translateX(4px); }
}

#mgiris .mg-logo{ height:64px; width:auto; display:inline-block; }
#mgiris .mg-kicker{
  font-family:var(--gro);
  font-size:11px; font-weight:500;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--accent);
  margin:20px 0 8px;
}
#mgiris .mg-title{
  font-family:var(--slab);
  font-weight:500;
  font-size:clamp(28px,7vw,34px);
  line-height:1.15;
  color:var(--ink);
  margin:0 0 6px;
}
#mgiris .mg-sub{
  font-size:14px; color:var(--muted); line-height:1.5;
  margin:0 0 28px;
}

/* Form */
#mgiris .mg-form{ text-align:left; }
#mgiris .mg-field{ margin-bottom:16px; }
#mgiris .mg-label{
  display:block;
  font-family:var(--gro);
  font-size:11px; font-weight:500;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--body);
  margin-bottom:6px;
}
#mgiris .mg-inputwrap{ position:relative; }
#mgiris .mg-input{
  width:100%; height:48px;
  padding:0 14px;
  font-family:var(--sans); font-size:16px; color:var(--ink);
  background:var(--bg-alt);
  border:1px solid var(--line);
  border-radius:10px;
  transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
  appearance:none;
}
#mgiris .mg-input--pw{ padding-right:52px; }
#mgiris .mg-input:hover{ border-color:#d3d8d6; }
#mgiris .mg-input:focus{ outline:none; }
#mgiris .mg-input:focus-visible{
  border-color:var(--accent);
  background:var(--bg);
  box-shadow:0 0 0 3px var(--accent-tint), 0 0 0 1px var(--accent);
}
#mgiris .mg-eye{
  position:absolute; top:50%; right:4px;
  transform:translateY(-50%);
  width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  background:none; border:none; border-radius:8px;
  color:var(--muted); cursor:pointer;
  transition:color .18s ease, background-color .18s ease;
}
#mgiris .mg-eye:hover{ color:var(--accent); background:var(--accent-tint); }
#mgiris .mg-eye:focus-visible{
  outline:2px solid var(--accent); outline-offset:2px;
}
#mgiris .mg-eye svg{ width:20px; height:20px; display:block; }
#mgiris .mg-eye .mg-eye-off{ display:none; }
#mgiris .mg-eye[aria-pressed="true"] .mg-eye-on{ display:none; }
#mgiris .mg-eye[aria-pressed="true"] .mg-eye-off{ display:block; }

/* Hata mesajı */
#mgiris .mg-error{
  display:none;
  align-items:flex-start; gap:8px;
  margin:2px 0 14px;
  padding:10px 12px;
  font-size:13.5px; line-height:1.45;
  color:#8a3b12;
  background:#faf1ea;
  border:1px solid #ecd5c4;
  border-radius:10px;
}
#mgiris .mg-error.mg-error--on{ display:flex; }
#mgiris .mg-error svg{ flex:none; width:16px; height:16px; margin-top:2px; }

/* Buton */
#mgiris .mg-btn{
  width:100%; height:50px;
  margin-top:6px;
  font-family:var(--gro); font-size:15px; font-weight:500;
  letter-spacing:.06em;
  color:#fff;
  background:var(--accent);
  border:none; border-radius:10px;
  cursor:pointer;
  transition:background-color .18s ease, transform .12s ease;
}
#mgiris .mg-btn:hover{ background:var(--accent-d); }
#mgiris .mg-btn:active{ transform:translateY(1px); }
#mgiris .mg-btn:focus-visible{
  outline:2px solid var(--accent-d); outline-offset:3px;
}
#mgiris .mg-btn[disabled]{ opacity:.65; cursor:default; transform:none; }

/* Footer note — in flow, centered with the card, never overlaps */
#mgiris .mg-foot{
  margin:24px 0 auto;
  padding:0 12px;
  text-align:center;
  font-size:12.5px; letter-spacing:.01em;
  color:rgba(233,242,240,.72);
}

/* ---- Giriş sonrası açılış ekranı (splash) ----
   Tema: prior → posterior. Soluk geniş eğri (prior) sabit durur;
   posterior eğrisi ~0.85 sn'de çizilir, ortalama çizgisi ve g etiketi belirir.
   Toplam ~1.95 sn, sonda beyaza geçip sunuma bağlanır (sunum beyaz açılır). */
#mgiris .mg-splash{
  position:fixed; inset:0; z-index:60;
  display:none;
  flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(120% 120% at 50% 18%, #256058 0%, #1a4a42 55%, #123a34 100%);
}
#mgiris .mg-splash--on{ display:flex; animation:mgiris-sp-in .24s ease-out; }
@keyframes mgiris-sp-in{ from{ opacity:0; } to{ opacity:1; } }

#mgiris .mg-splash::after{
  content:""; position:absolute; inset:0; background:#fff;
  opacity:0; pointer-events:none; transition:opacity .34s ease;
}
#mgiris .mg-splash--out::after{ opacity:1; }
#mgiris .mg-splash--out .mg-splash-ic{ opacity:0; transform:translateY(-6px); }

#mgiris .mg-splash-ic{
  display:flex; flex-direction:column; align-items:center;
  padding:0 20px;
  transition:opacity .3s ease, transform .3s ease;
}
#mgiris .mg-splash-logo{ height:52px; width:auto; margin-bottom:16px; }
#mgiris .mg-splash-kick{
  font-family:var(--gro);
  font-size:11px; font-weight:500;
  letter-spacing:.18em; text-transform:uppercase;
  color:rgba(233,242,240,.66);
  margin:0 0 22px;
}

#mgiris .mg-splash-chart{ width:min(300px,74vw); height:auto; display:block; overflow:visible; }
#mgiris .mg-sp-axis{ stroke:rgba(255,255,255,.28); stroke-width:1; }
#mgiris .mg-sp-prior{
  fill:none; stroke:rgba(255,255,255,.4); stroke-width:1.6;
  stroke-dasharray:4 5; stroke-linecap:round;
}
#mgiris .mg-sp-post{
  fill:#d98e57; fill-opacity:0;
  stroke:#e0995f; stroke-width:2.2; stroke-linecap:round;
  stroke-dasharray:1; stroke-dashoffset:1; /* pathLength=1: soldan çizilir */
  animation:mgiris-sp-draw .85s cubic-bezier(.55,.08,.28,1) .2s forwards,
            mgiris-sp-fill .45s ease .85s forwards;
}
@keyframes mgiris-sp-draw{ to{ stroke-dashoffset:0; } }
@keyframes mgiris-sp-fill{ to{ fill-opacity:.15; } }
#mgiris .mg-sp-mean{
  stroke:rgba(255,255,255,.55); stroke-width:1; stroke-dasharray:3 3;
  transform-box:fill-box; transform-origin:50% 100%; transform:scaleY(0);
  animation:mgiris-sp-rise .3s ease-out .95s forwards;
}
@keyframes mgiris-sp-rise{ to{ transform:scaleY(1); } }
#mgiris .mg-sp-dot{
  fill:#e8b98f;
  transform-box:fill-box; transform-origin:center; transform:scale(0);
  animation:mgiris-sp-pop .3s cubic-bezier(.34,1.56,.64,1) 1.05s forwards;
}
@keyframes mgiris-sp-pop{ to{ transform:scale(1); } }
#mgiris .mg-sp-lab{
  font-family:var(--gro); font-size:9px; letter-spacing:.08em;
  fill:rgba(255,255,255,.55); opacity:0;
  animation:mgiris-sp-lab .35s ease forwards;
}
#mgiris .mg-sp-lab--p{ animation-delay:.45s; }
#mgiris .mg-sp-lab--g{ fill:#eec39c; animation-delay:1.1s; }
@keyframes mgiris-sp-lab{ to{ opacity:1; } }

#mgiris .mg-splash-status{
  margin-top:18px; min-height:22px;
  font-size:14px; color:rgba(233,242,240,.9);
}
#mgiris .mg-sp-msg{ display:inline-flex; align-items:center; gap:8px; }
#mgiris .mg-sp-msg svg{ width:15px; height:15px; color:#8fd0be; flex:none; }
#mgiris .mg-sp-msg--in{ animation:mgiris-sp-msg .32s ease; }
@keyframes mgiris-sp-msg{ from{ opacity:0; transform:translateY(5px); } to{ opacity:1; transform:none; } }

#mgiris .mg-splash-bar{
  width:210px; height:2px; margin-top:20px; border-radius:2px;
  background:rgba(255,255,255,.16); overflow:hidden;
}
#mgiris .mg-splash-bar i{
  display:block; height:100%; width:0; border-radius:2px;
  background:linear-gradient(90deg,#79b3a5,#d98e57);
  animation:mgiris-sp-bar 1.5s cubic-bezier(.3,.6,.4,1) .1s forwards;
}
@keyframes mgiris-sp-bar{ to{ width:100%; } }

/* Küçük ekran */
@media (max-width:420px){
  #mgiris .mg-card{ padding:36px 24px 30px; border-radius:16px; }
  #mgiris .mg-card::before{ left:24px; right:24px; }
}

/* Hareket azaltma — splash animasyonsuz son hâliyle kısa görünür */
@media (prefers-reduced-motion:reduce){
  #mgiris .mg-glow{ animation:none; opacity:.55; }
  #mgiris .mg-shake{ animation:none; }
  #mgiris .mg-input, #mgiris .mg-btn, #mgiris .mg-eye{ transition:none; }
  #mgiris .mg-btn:active{ transform:none; }
  #mgiris .mg-splash--on{ animation:none; }
  #mgiris .mg-splash::after{ transition:none; }
  #mgiris .mg-splash-ic{ transition:none; }
  #mgiris .mg-sp-post{ animation:none; stroke-dashoffset:0; fill-opacity:.15; }
  #mgiris .mg-sp-mean{ animation:none; transform:none; }
  #mgiris .mg-sp-dot{ animation:none; transform:none; }
  #mgiris .mg-sp-lab{ animation:none; opacity:1; }
  #mgiris .mg-splash-bar i{ animation:none; width:100%; }
  #mgiris .mg-sp-msg--in{ animation:none; }
}
</style>
</head>
<body style="margin:0">

<div id="mgiris">
  <div class="mg-glow" aria-hidden="true"></div>

  <main class="mg-card" id="mg-card">
    <img class="mg-logo" src="/assets/logo.png" alt="MUPLAB logosu">
    <p class="mg-kicker">MUPLAB · Doctoral Seminar · 2026</p>
    <h1 class="mg-title">Seminar Presentation</h1>
    <p class="mg-sub">Enter the committee credentials you received to open the presentation.</p>

    <form class="mg-form" id="mg-form" autocomplete="off" novalidate>
      <div class="mg-field">
        <label class="mg-label" for="mg-id">Committee ID</label>
        <div class="mg-inputwrap">
          <input class="mg-input" id="mg-id" name="juri-id" type="text"
                 autocomplete="off" autocapitalize="none" autocorrect="off"
                 spellcheck="false" inputmode="text" aria-describedby="mg-error" required>
        </div>
      </div>

      <div class="mg-field">
        <label class="mg-label" for="mg-pw">Password</label>
        <div class="mg-inputwrap">
          <input class="mg-input mg-input--pw" id="mg-pw" name="juri-sifre"
                 type="password" autocomplete="off" aria-describedby="mg-error" required>
          <button class="mg-eye" type="button" id="mg-eye"
                  aria-label="Show or hide the password" aria-pressed="false">
            <svg class="mg-eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="mg-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-6.5 10-6.5c2 0 3.7.6 5.1 1.4M22 12s-3.5 6.5-10 6.5c-2 0-3.7-.6-5.1-1.4"/>
              <path d="M4 20 20 4"/>
            </svg>
          </button>
        </div>
      </div>

      <p class="mg-error" id="mg-error" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><path d="M12 16.5h.01"/>
        </svg>
        <span id="mg-error-text">The credentials do not match — please try again.</span>
      </p>

      <button class="mg-btn" type="submit" id="mg-btn">Sign in</button>
    </form>
  </main>

  <p class="mg-foot">Access is limited to invited committee members.</p>

  <!-- Giriş sonrası açılış ekranı -->
  <div class="mg-splash" id="mg-splash">
    <div class="mg-splash-ic">
      <img class="mg-splash-logo" src="/assets/logo.png" alt="">
      <p class="mg-splash-kick">Living Bayesian Meta-Analysis</p>
      <svg class="mg-splash-chart" viewBox="0 0 240 100" aria-hidden="true">
        <line class="mg-sp-axis" x1="10" y1="88" x2="230" y2="88"/>
        <path class="mg-sp-prior" d="M12 87 C 58 85, 86 58, 118 58 C 150 58, 178 85, 224 87"/>
        <text class="mg-sp-lab mg-sp-lab--p" x="30" y="70">prior</text>
        <path class="mg-sp-post" pathLength="1" d="M12 87.5 C 86 87, 106 14, 126 14 C 146 14, 166 87, 224 87.5"/>
        <line class="mg-sp-mean" x1="126" y1="88" x2="126" y2="14"/>
        <circle class="mg-sp-dot" cx="126" cy="14" r="3.4"/>
        <text class="mg-sp-lab mg-sp-lab--g" x="136" y="17">g = +0.15</text>
      </svg>
      <div class="mg-splash-status" role="status" aria-live="polite">
        <span class="mg-sp-msg mg-sp-msg--in" id="mg-sp-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>Credentials verified</span>
      </div>
      <div class="mg-splash-bar"><i></i></div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  var KEY = 'muplab_seminer';
  var NEXT = 'seminer-sunum.html';
  /* Credential check runs on the lab's own server (api.muplab.com);
     the local address is used automatically during development. */
  var API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://127.0.0.1:5000' : 'https://api.muplab.com';

  /* Already signed in: go straight to the presentation */
  try{
    if (sessionStorage.getItem(KEY) === '1'){
      location.replace(NEXT);
      return;
    }
  }catch(e){ /* storage unavailable: fall back to normal sign-in */ }

  var form  = document.querySelector('#mg-form');
  var card  = document.querySelector('#mg-card');
  var idEl  = document.querySelector('#mg-id');
  var pwEl  = document.querySelector('#mg-pw');
  var eye   = document.querySelector('#mg-eye');
  var btn   = document.querySelector('#mg-btn');
  var errEl = document.querySelector('#mg-error');
  var errTx = document.querySelector('#mg-error-text');
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)');

  idEl.focus();

  /* Password visibility — state conveyed via aria-pressed; label is fixed */
  eye.addEventListener('click', function(){
    var show = pwEl.type === 'password';
    pwEl.type = show ? 'text' : 'password';
    eye.setAttribute('aria-pressed', show ? 'true' : 'false');
    pwEl.focus();
  });

  function showError(msg){
    errTx.textContent = msg;
    errEl.classList.add('mg-error--on');
    if (!reduce.matches){
      card.classList.remove('mg-shake');
      /* animasyonu yeniden tetikle */
      void card.offsetWidth;
      card.classList.add('mg-shake');
    }
  }

  card.addEventListener('animationend', function(){
    card.classList.remove('mg-shake');
  });

  function hideError(){
    errEl.classList.remove('mg-error--on');
  }

  idEl.addEventListener('input', hideError);
  pwEl.addEventListener('input', hideError);

  /* Giriş sonrası açılış ekranı: ~1.95 sn oynar, sonra sunuma geçer */
  function acilisGoster(){
    var sp  = document.getElementById('mg-splash');
    var msg = document.getElementById('mg-sp-msg');

    /* splash oynarken sunum sayfasını önden ısıt */
    try{
      var on = document.createElement('link');
      on.rel = 'prefetch'; on.href = NEXT;
      document.head.appendChild(on);
    }catch(e){}

    function mesaj(t){
      msg.classList.remove('mg-sp-msg--in');
      /* animasyonu yeniden tetikle */
      void msg.offsetWidth;
      msg.textContent = t;
      msg.classList.add('mg-sp-msg--in');
    }

    sp.classList.add('mg-splash--on');

    if (reduce.matches){
      mesaj('Opening the presentation…');
      setTimeout(function(){ location.replace(NEXT); }, 650);
      return;
    }

    setTimeout(function(){ mesaj('Loading registered results…'); }, 620);
    setTimeout(function(){ mesaj('Preparing live panels…'); }, 1180);
    setTimeout(function(){ sp.classList.add('mg-splash--out'); }, 1550);
    setTimeout(function(){ location.replace(NEXT); }, 1950);
  }

  form.addEventListener('submit', function(ev){
    ev.preventDefault();

    var id = idEl.value.trim();
    var pw = pwEl.value;

    if (!id || !pw){
      showError('Please fill in both fields.');
      (!id ? idEl : pwEl).focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verifying…';

    fetch(API + '/api/seminer/giris', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, sifre: pw })
    }).then(function(resp){
      return resp.json().then(function(veri){ return { st: resp.status, veri: veri }; });
    }).then(function(r){
      if (r.st === 200 && r.veri && r.veri.ok){
        try{
          sessionStorage.setItem(KEY, '1');
          sessionStorage.setItem(KEY + '_rol', r.veri.rol || 'juri');
          if (r.veri.etiket) sessionStorage.setItem(KEY + '_ad', r.veri.etiket);
        }catch(e){}
        acilisGoster();
        return;
      }
      btn.disabled = false;
      btn.textContent = 'Sign in';
      if (r.st === 429){
        showError('Too many attempts — please wait a while and try again.');
      } else {
        showError('The credentials do not match — please try again.');
        pwEl.value = '';
        pwEl.focus();
      }
    }).catch(function(){
      btn.disabled = false;
      btn.textContent = 'Sign in';
      showError('Could not reach the verification service — please check your connection and try again.');
    });
  });
})();
</script>
